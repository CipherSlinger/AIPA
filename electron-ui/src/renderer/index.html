<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:;" />
    <title>AIPA</title>
  </head>
  <body>
    <!-- Splash screen: visible before React mounts, removed by App.tsx -->
    <div id="aipa-splash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1e1e1e;color:#cccccc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;transition:opacity 0.3s ease;">
      <div style="font-size:32px;font-weight:700;letter-spacing:2px;margin-bottom:16px;color:#ffffff;">AIPA</div>
      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#4a9eff;animation:aipaPulse 1.4s ease-in-out infinite;"></span>
        <span style="width:8px;height:8px;border-radius:50%;background:#4a9eff;animation:aipaPulse 1.4s ease-in-out 0.2s infinite;"></span>
        <span style="width:8px;height:8px;border-radius:50%;background:#4a9eff;animation:aipaPulse 1.4s ease-in-out 0.4s infinite;"></span>
      </div>
      <div id="aipa-splash-status" style="font-size:12px;color:#888888;">Loading...</div>
      <div id="aipa-splash-error" style="display:none;margin-top:24px;text-align:center;max-width:480px;">
        <div style="font-size:14px;color:#ff6b6b;margin-bottom:12px;">App failed to load</div>
        <button onclick="location.reload()" style="padding:8px 24px;border:1px solid #555;border-radius:6px;background:#333;color:#fff;cursor:pointer;font-size:13px;margin:4px;">Reload</button>
        <button onclick="window.electronAPI&&window.electronAPI.prefsResetAll?window.electronAPI.prefsResetAll().then(()=>location.reload()):location.reload()" style="padding:8px 24px;border:1px solid #555;border-radius:6px;background:#333;color:#fff;cursor:pointer;font-size:13px;margin:4px;">Reset Preferences</button>
      </div>
      <style>@keyframes aipaPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
    </div>
    <script>
      // Fallback: if React does not mount within 5 seconds, show error state
      window.__aipaSplashTimer = setTimeout(function() {
        var splash = document.getElementById('aipa-splash');
        var status = document.getElementById('aipa-splash-status');
        var error = document.getElementById('aipa-splash-error');
        if (splash && splash.style.display !== 'none') {
          if (status) status.textContent = 'App is taking too long to load. Try reloading or resetting preferences.';
          if (error) error.style.display = 'block';
        }
      }, 5000);
      // Global error handler to catch module-level import failures
      window.addEventListener('error', function(e) {
        var splash = document.getElementById('aipa-splash');
        var status = document.getElementById('aipa-splash-status');
        var error = document.getElementById('aipa-splash-error');
        if (splash && splash.style.display !== 'none') {
          if (status) status.textContent = 'Error: ' + (e.message || 'Unknown error');
          if (error) error.style.display = 'block';
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
